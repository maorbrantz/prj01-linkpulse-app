name: release

on:
  push:
    branches: [main]

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: il-central-1
  ECR_REGISTRY: 149536464688.dkr.ecr.il-central-1.amazonaws.com
  ROLE_ARN: arn:aws:iam::149536464688:role/prj01-app-ci
  PLATFORM_REPO: maorbrantz/prj01-eks-gitops-platform
  VALUES_PATH: gitops/apps/dev/linkpulse/values.yaml

jobs:
  push:
    name: build and push images
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: short sha
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: login to ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: build and push
        run: |
          for service in api worker web; do
            image="${ECR_REGISTRY}/prj01/linkpulse-${service}:${{ steps.tag.outputs.sha }}"
            docker build -t "$image" "services/${service}"
            docker push "$image"
          done

  promote:
    name: open gitops bump pr
    runs-on: ubuntu-latest
    needs: push
    steps:
      - name: checkout platform repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PLATFORM_REPO }}
          token: ${{ secrets.GITOPS_PAT }}

      - name: bump image tag
        env:
          SHA: ${{ needs.push.outputs.sha }}
        run: |
          sed -i -E "s/^(  tag: ).*/\1\"${SHA}\"/" "$VALUES_PATH"
          git diff --exit-code "$VALUES_PATH" && echo "no change" && exit 0 || true

      - name: open pull request
        env:
          GH_TOKEN: ${{ secrets.GITOPS_PAT }}
          SHA: ${{ needs.push.outputs.sha }}
        run: |
          branch="deploy/${SHA}"
          git config user.name "linkpulse-release"
          git config user.email "linkpulse-release@users.noreply.github.com"
          git checkout -b "$branch"
          git commit -am "chore: bump linkpulse image tag to ${SHA}"
          git push -u origin "$branch" --force
          gh pr create \
            --repo "$PLATFORM_REPO" \
            --head "$branch" \
            --base main \
            --title "deploy: linkpulse ${SHA}" \
            --body "Rolls linkpulse in dev to ${SHA}. Images are already built and pushed to ECR by the app release run."
