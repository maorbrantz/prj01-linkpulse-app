name: ci

on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: lint and test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, worker]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements-dev.txt

      - name: install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install ruff==0.8.4

      - name: ruff lint
        run: ruff check .

      - name: pytest with coverage
        run: pytest

  images:
    name: build and scan images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, worker, web]
    steps:
      - uses: actions/checkout@v4

      - name: build image
        run: docker build -t linkpulse-${{ matrix.service }}:${{ github.sha }} services/${{ matrix.service }}

      - name: trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: linkpulse-${{ matrix.service }}:${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  gitleaks:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
