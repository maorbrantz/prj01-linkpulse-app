apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "linkpulse.name" . }}-api
  labels:
    {{- include "linkpulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  # the hpa owns the replica count, so no static replicas field here. the canary
  # is replica ratio based (no trafficRouting): ingress reaches the api through
  # the web nginx and the api Service, so weight is expressed as a share of pods.
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "linkpulse.name" . }}
      app.kubernetes.io/component: api
  strategy:
    canary:
      steps:
        - setWeight: 20
        - pause:
            duration: 60s
        - setWeight: 50
        - pause:
            duration: 60s
  template:
    metadata:
      labels:
        {{- include "linkpulse.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ include "linkpulse.apiServiceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}-api:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            - name: PORT
              value: "{{ .Values.api.port }}"
            - name: AWS_REGION
              value: {{ .Values.aws.region | quote }}
            - name: LINKS_TABLE
              value: {{ .Values.aws.linksTable | quote }}
            - name: STATS_TABLE
              value: {{ .Values.aws.statsTable | quote }}
            - name: CLICK_QUEUE_URL
              value: {{ .Values.aws.clickQueueUrl | quote }}
            - name: BASE_URL
              value: {{ .Values.api.baseUrl | quote }}
            {{- if .Values.aws.endpointUrl }}
            - name: AWS_ENDPOINT_URL
              value: {{ .Values.aws.endpointUrl | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.api.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.api.port }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "linkpulse.name" . }}-api
  labels:
    {{- include "linkpulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/name: {{ include "linkpulse.name" . }}
    app.kubernetes.io/component: api
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "linkpulse.name" . }}-api
  labels:
    {{- include "linkpulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: {{ include "linkpulse.name" . }}-api
  minReplicas: {{ .Values.api.hpa.minReplicas }}
  maxReplicas: {{ .Values.api.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.hpa.targetCPUUtilizationPercentage }}
