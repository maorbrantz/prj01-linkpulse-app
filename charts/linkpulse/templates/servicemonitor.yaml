{{- if .Values.api.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "linkpulse.name" . }}-api
  labels:
    {{- include "linkpulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
    # prometheus runs with cross namespace selectors, so this label is not needed
    # for discovery, but keeping the release label makes intent explicit.
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "linkpulse.name" . }}
      app.kubernetes.io/component: api
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.api.serviceMonitor.interval }}
{{- end }}
{{- if .Values.worker.serviceMonitor.enabled }}
---
# the worker Deployment exposes metrics but ships no Service, so give it a
# headless metrics Service for the ServiceMonitor to target.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "linkpulse.name" . }}-worker-metrics
  labels:
    {{- include "linkpulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ include "linkpulse.name" . }}
    app.kubernetes.io/component: worker
  ports:
    - name: metrics
      port: {{ .Values.worker.metricsPort }}
      targetPort: {{ .Values.worker.metricsPort }}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "linkpulse.name" . }}-worker
  labels:
    {{- include "linkpulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "linkpulse.name" . }}
      app.kubernetes.io/component: worker
  endpoints:
    - port: metrics
      path: /metrics
      interval: {{ .Values.worker.serviceMonitor.interval }}
{{- end }}
