nameOverride: ""

image:
  repository: linkpulse
  tag: local
  pullPolicy: IfNotPresent

serviceAccount:
  create: true

# pod and container security context applied to every workload. these satisfy the
# cluster policies (run as non root, seccomp runtime default, no privilege
# escalation). the app images already run as a non-root user.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

aws:
  region: us-east-1
  linksTable: links
  statsTable: click_stats
  clickQueueUrl: ""
  endpointUrl: ""

api:
  replicas: 2
  port: 8000
  baseUrl: ""
  serviceAccountName: ""
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

worker:
  replicas: 1
  metricsPort: 9000
  serviceAccountName: ""
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

web:
  replicas: 2
  port: 8080
  apiUpstream: http://linkpulse-api:8000
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi

ingress:
  enabled: false
  className: alb
  host: ""
  groupName: ""
  annotations: {}
