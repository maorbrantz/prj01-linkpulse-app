<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LinkPulse</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <header>
        <h1>LinkPulse</h1>
        <p class="tagline">Shorten a link, then watch the clicks add up.</p>
      </header>

      <form id="shorten-form">
        <label for="url-input">Long URL</label>
        <div class="row">
          <input
            id="url-input"
            name="url"
            type="url"
            placeholder="https://example.com/a-very-long-path"
            required
          />
          <button type="submit">Shorten</button>
        </div>
      </form>

      <section id="result" class="result hidden">
        <p>Your short link:</p>
        <a id="short-link" href="#" target="_blank" rel="noopener"></a>
        <button id="stats-button" type="button">View stats</button>
      </section>

      <section id="stats" class="stats hidden">
        <h2>Clicks for <span id="stats-code"></span></h2>
        <p class="total">Total: <span id="stats-total">0</span></p>
        <table>
          <thead>
            <tr><th>Day</th><th>Clicks</th></tr>
          </thead>
          <tbody id="stats-rows"></tbody>
        </table>
      </section>

      <p id="error" class="error hidden"></p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
